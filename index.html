<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plume Hunter Test</title>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

<style>
html, body {
    margin: 0;
    height: 100%;
}

#map {
    width: 100%;
    height: 100vh;
}
</style>

</head>
<body>

<div id="map"></div>

https://unpkg.com/leaflet@1.9.4/dist/leaflet.js

<script>

const map = L.map('map').setView(
    [13.548,100.275],
    15
);

L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom: 19
    }
).addTo(map);

L.marker([13.548,100.275])
.addTo(map)
.bindPopup('Plume Hunter Test');

</script>

</body>
</html>
